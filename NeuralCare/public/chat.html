<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralCare - Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #10b981; --danger: #ef4444; --surface: #ffffff; --text: #1f2937; --text-light: #6b7280; --border: #e5e7eb; --shadow: 0 10px 25px rgba(0,0,0,0.1); --radius: 12px; }
        body { font-family: 'Inter', sans-serif; background: #f9fafb; }
        .app-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 220px; background: var(--surface); padding: 20px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; background: var(--primary); color: white; border-radius: var(--radius); margin-bottom: 20px; }
        .sidebar-user { display: flex; align-items: center; gap: 10px; }
        .sidebar-user .avatar { width: 40px; height: 40px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 18px; }
        .nav-item { padding: 12px 15px; border-radius: 8px; cursor: pointer; color: var(--text-light); display: flex; align-items: center; gap: 10px; margin-bottom: 5px; transition: all 0.2s; font-size: 14px; }
        .nav-item:hover, .nav-item.active { background: #f3f4f6; color: var(--primary); }
        .btn-logout { width: 100%; padding: 10px; background: transparent; color: var(--danger); border: 1px solid var(--danger); border-radius: 8px; cursor: pointer; margin-top: auto; }
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 15px 20px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; background: #f9fafb; }
        .message { max-width: 75%; padding: 12px 18px; border-radius: 18px; margin-bottom: 12px; line-height: 1.5; }
        .message.user { background: var(--primary); color: white; margin-left: auto; border-bottom-right-radius: 4px; }
        .message.bot { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .chat-input-area { padding: 15px; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .chat-input-area input { flex: 1; padding: 12px 18px; border: 2px solid var(--border); border-radius: 25px; font-size: 14px; }
        .chat-input-area input:focus { outline: none; border-color: var(--primary); }
        .chat-input-area button { padding: 12px 20px; background: var(--primary); color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: 600; }
        .crisis-btn { background: var(--danger); color: white; padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .quick-btn { padding: 8px; background: #f3f4f6; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .lang-selector { display: flex; gap: 5px; margin-left: 10px; }
        .lang-btn { padding: 4px 8px; border: 1px solid var(--border); background: white; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .lang-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .typing-indicator { padding: 10px 15px; background: var(--surface); border: 1px solid var(--border); border-radius: 18px; display: inline-block; }
        .typing-dots { display: flex; gap: 4px; }
        .typing-dots span { width: 6px; height: 6px; background: #9ca3af; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        .btn { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; }
        .btn:disabled { background: #9ca3af; }
        .thinking-indicator { background: white; border: 1px solid #e5e7eb; border-radius: 18px; padding: 15px 20px; margin-bottom: 12px; display: inline-block; }
        .thinking-dots { display: flex; gap: 4px; align-items: center; }
        .thinking-dots span { width: 8px; height: 8px; background: #6366f1; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .thinking-dots span:nth-child(1) { animation-delay: -0.32s; }
        .thinking-dots span:nth-child(2) { animation-delay: -0.16s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        @media (max-width: 768px) { .app-layout { flex-direction: column; } .sidebar { width: 100%; } }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-user">
                    <div class="avatar" id="userAvatar">U</div>
                    <div>
                        <div id="userName" style="font-weight: 600;">User</div>
                        <small id="userEmail" style="opacity: 0.8;">user@email</small>
                    </div>
                </div>
            </div>
            <nav id="mainNav">
                <div class="nav-item active" data-page="chat.html"><span>💬</span> Chat</div>
                <div class="nav-item" data-page="mood.html"><span>😊</span> Mood Tracker</div>
                <div class="nav-item" data-page="journal.html"><span>📝</span> Journal</div>
                <div class="nav-item" data-page="progress.html"><span>📊</span> My Progress</div>
                <div class="nav-item" data-page="clinic.html"><span>🏥</span> Clinic Reports</div>
                <div class="nav-item" data-page="patient.html"><span>👤</span> Patient Details</div>
                <div class="nav-item" data-page="medication.html"><span>💊</span> Medications</div>
                <div class="nav-item" data-page="routine.html"><span>⏰</span> Daily Routine</div>
            </nav>
            <div class="quick-actions">
                <button class="quick-btn" onclick="quickTopic('breathing')">🌬️ Breathing</button>
                <button class="quick-btn" onclick="quickTopic('sleep')">😴 Sleep</button>
            </div>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </aside>
        <main class="main-content">
            <div class="chat-header">
                <div class="d-flex align-items-center">
                    <h2>💬 Talk to NeuralCare</h2>
                    <div class="lang-selector">
                        <button class="lang-btn active" onclick="setLanguage('en')" title="English">EN</button>
                        <button class="lang-btn" onclick="setLanguage('hi')" title="हिंदी">HI</button>
                        <button class="lang-btn" onclick="setLanguage('te')" title="తెలుగు">TE</button>
                        <button class="lang-btn" onclick="setLanguage('ta')" title="தமிழ்">TA</button>
                        <button class="lang-btn" onclick="setLanguage('bn')" title="বাংলা">BN</button>
                        <button class="lang-btn" onclick="setLanguage('mr')" title="मराठी">MR</button>
                        <button class="lang-btn" onclick="setLanguage('kn')" title="ಕನ್ನಡ">KN</button>
                        <button class="lang-btn" onclick="setLanguage('ml')" title="മലയാളം">ML</button>
                    </div>
                </div>
                <div class="d-flex align-items-center">
                    <div class="notification-bell" onclick="toggleNotifications()">
                        🔔
                        <span class="notification-badge" id="notifBadge" style="display:none;">0</span>
                        <div class="notification-dropdown" id="notifDropdown"></div>
                    </div>
                    <button class="crisis-btn" onclick="showCrisis()">🆘 Crisis</button>
                </div>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    <p>Hi! I'm NeuralCare. How are you feeling today? Share what's on your mind.</p>
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Type your message..." onkeypress="if(event.key==='Enter')sendMessage()">
                <button onclick="sendMessage()" id="chatSendBtn">Send</button>
            </div>
        </main>
    </div>
    <script>
        const API = '';
        let token = localStorage.getItem('neuralcare_token');
        let currentPage = localStorage.getItem('current_page') || 'chat.html';
        let currentLang = localStorage.getItem('lang') || 'en';

        const TRANSLATIONS = {
            en: { greeting: "Hi! I'm NeuralCare. How are you feeling today? Share what's on your mind.", placeholder: "Type your message...", crisis: "🆘 Crisis", breathing: "🌬️ Breathing", sleep: "😴 Sleep" },
            hi: { greeting: "नमस्ते! मैं NeuralCare हूं। आज आप कैसा महसूस कर रहे हैं? अपने मन की बात बताएं।", placeholder: "अपना संदेश लिखें...", crisis: "🆘 संकट", breathing: "🌬️ श्वास", sleep: "😴 नींद" },
            te: { greeting: "నమस्तకరం! నేను NeuralCare. ఈరోజు ఎలా feel అవుతుంది? మీ హృదయం లో ఉన్నది చెప్పండ.", placeholder: "Your message...", crisis: "🆘 crises", breathing: "🌬️ Breathing", sleep: "😴 Sleep" },
            ta: { greeting: "வணக்கம்! நான் NeuralCare. இன்று உங்களுக்கு எப்படி உணர்கிறீர்கள்? உங்கள் மனதில் உள்ளதை சொல்லுங்கள்.", placeholder: "Your message...", crisis: "🆘 krisis", breathing: "🌬️ Breathing", sleep: "😴 Sleep" },
            bn: { greeting: "নমস্কার! আমি NeuralCare। আজ আপনি কেমন অনুভব করছেন? মনের কথা বলুন।", placeholder: "Your message...", crisis: "🆘 সংকট", breathing: "🌬️ শ্বাস", sleep: "😴 ঘুম" },
            mr: { greeting: "नमस्कार! मी NeuralCare. आज तुम्हाला कसा वाटतं? मनातलं सांगा.", placeholder: "Your message...", crisis: "🆘 संकट", breathing: "🌬️ श्वास", sleep: "😴 झोप" },
            kn: { greeting: "ನಮಸ್ಕಾರ! ನಾನು NeuralCare. ಇಂದು ನೀವು ಹೇಗೆ ಭಾವಿಸುತ್ತಿದ್ದೀರಿ? ಮನಸ್ಸಿನ ಮಾತುಗಳನ್ನು ಹೇಳಿ.", placeholder: "Your message...", crisis: "🆘 krisi", breathing: "🌬️ ಉಸಿರಾಟ", sleep: "😴 ನಿದ್ರೆ" },
            ml: { greeting: "നമസ്കാരം! ഞാനാണ് NeuralCare. ഇന്ന് നിങ്ങള്‍ക്ക് എങ്ങനെ അനുഭവപ്പെടുന്നു? മനസ്സിലുള്ളത് പറയൂ.", placeholder: "Your message...", crisis: "🆘 അടിയന്തരാവസ്ഥ", breathing: "🌬️ ശ്വാസം", sleep: "😴  uyയിട്ട്" }
        };

        if (!token) { window.location.href = 'index.html'; }
        
        checkAuth();
        
        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('chatInput').placeholder = TRANSLATIONS[lang].placeholder;
        }
        
        document.querySelectorAll('.lang-btn').forEach(btn => {
            if (btn.textContent.toUpperCase() === currentLang.toUpperCase()) btn.classList.add('active');
        });
        document.getElementById('chatInput').placeholder = TRANSLATIONS[currentLang].placeholder;
        
        checkAuth();

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                const page = this.getAttribute('data-page');
                localStorage.setItem('current_page', page);
                window.location.href = page;
            });
        });

        async function checkAuth() {
            try {
                const res = await fetch(`${API}/api/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('userName').textContent = data.user.name || 'User';
                    document.getElementById('userEmail').textContent = data.user.email;
                    document.getElementById('userAvatar').textContent = (data.user.name || 'U')[0].toUpperCase();
                    loadChatHistory();
                } else { logout(); }
            } catch(e) { logout(); }
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;
            document.getElementById('chatSendBtn').disabled = true;
            input.disabled = true;
            addMessage(message, 'user');
            input.value = '';
            
            // Show thinking indicator
            const container = document.getElementById('chatMessages');
            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = 'message bot';
            thinkingDiv.id = 'thinkingMsg';
            thinkingDiv.innerHTML = `<div class="thinking-indicator"><div class="thinking-dots"><span></span><span></span><span></span></div> <span style="margin-left:10px;color:#6366f1;">Thinking...</span></div>`;
            container.appendChild(thinkingDiv);
            container.scrollTop = container.scrollHeight;
            
            try {
                const res = await fetch(`${API}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ message, language: currentLang })
                });
                
                // Remove thinking indicator
                const thinking = document.getElementById('thinkingMsg');
                if (thinking) thinking.remove();
                
                const data = await res.json();
                if (data.is_crisis) {
                    addMessage(data.response + '\n\n' + data.crisis_resources.map(r => `${r.name}: ${r.phone}`).join('\n'), 'bot');
                } else {
                    addMessage(data.response, 'bot');
                }
                saveChatHistory(message, data.response || '');
            } catch(e) { 
                const thinking = document.getElementById('thinkingMsg');
                if (thinking) thinking.remove();
                addMessage("Hey buddy! What's up? 😄", 'bot'); 
            }
            document.getElementById('chatSendBtn').disabled = false;
            input.disabled = false;
            input.focus();
        }

        function addMessage(text, sender) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = `<p>${text.replace(/\n/g, '<br>')}</p>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function saveChatHistory(message, response) {
            await fetch(`${API}/api/chat/save`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ message, response })
            });
        }

        async function loadChatHistory() {
            try {
                const res = await fetch(`${API}/api/chat/history`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                if (data.chats && data.chats.length > 0) {
                    document.getElementById('chatMessages').innerHTML = '';
                    data.chats.forEach(chat => { addMessage(chat.message, 'user'); addMessage(chat.response, 'bot'); });
                }
            } catch(e) {}
        }

        async function quickTopic(topic) {
            const prompts = { breathing: "Teach me a breathing exercise", sleep: "I can't sleep well", stress: "I'm stressed", calm: "Help me calm down" };
            document.getElementById('chatInput').value = prompts[topic];
            sendMessage();
        }

        function showCrisis() { addMessage(`🆘 Crisis Resources:\n\n📞 iCall: 9152987821\n📞 Vandrevala: 1860 2662 345\n📞 Emergency: 112`, 'bot'); }
        
        function logout() { localStorage.removeItem('neuralcare_token'); window.location.href = 'index.html'; }
        
        // Notification functions
        async function loadNotifications() {
            try {
                const res = await fetch(`${API}/api/notifications`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                if (data.success && data.notifications) {
                    const badge = document.getElementById('notifBadge');
                    const dropdown = document.getElementById('notifDropdown');
                    
                    if (data.unreadCount > 0) {
                        badge.style.display = 'flex';
                        badge.textContent = data.unreadCount > 9 ? '9+' : data.unreadCount;
                    } else {
                        badge.style.display = 'none';
                    }
                    
                    if (data.notifications.length === 0) {
                        dropdown.innerHTML = '<div style="padding:20px;text-align:center;color:#666;">No notifications yet</div>';
                    } else {
                        dropdown.innerHTML = data.notifications.map(n => `
                            <div class="notification-item ${n.read ? 'read' : 'unread'}" onclick="markNotificationRead('${n._id}')">
                                <div class="notification-title">${n.title}</div>
                                <div class="notification-message">${n.message}</div>
                                <div class="d-flex justify-content-between">
                                    <span class="notification-time">${new Date(n.createdAt).toLocaleString()}</span>
                                    ${n.emailSent ? '<span class="notification-email-sent">📧 Email sent</span>' : ''}
                                </div>
                            </div>
                        `).join('');
                    }
                }
            } catch(e) { console.log('Error loading notifications'); }
        }
        
        async function toggleNotifications() {
            const dropdown = document.getElementById('notifDropdown');
            dropdown.classList.toggle('show');
            if (dropdown.classList.contains('show')) {
                loadNotifications();
                // Mark all as read
                await fetch(`${API}/api/notifications/read`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                document.getElementById('notifBadge').style.display = 'none';
            }
        }
        
        async function markNotificationRead(id) {
            await fetch(`${API}/api/notifications/read`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ notificationId: id })
            });
            loadNotifications();
        }
        
        // Close dropdown when clicking outside
        document.addEventListener('click', function(e) {
            const bell = document.querySelector('.notification-bell');
            const dropdown = document.getElementById('notifDropdown');
            if (bell && !bell.contains(e.target)) {
                dropdown.classList.remove('show');
            }
        });
        
        // Load notifications on page load
        loadNotifications();
        setInterval(loadNotifications, 60000); // Refresh every minute
    </script>
</body>
</html>
