<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralCare - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --surface: #ffffff;
            --text: #1f2937;
            --text-light: #6b7280;
            --border: #e5e7eb;
            --shadow: 0 10px 25px rgba(0,0,0,0.1);
            --radius: 12px;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 420px; }
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        .header {
            background: var(--primary);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 5px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .body { padding: 30px; }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text);
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .form-group .show-password {
            position: relative;
        }
        .form-group .show-password input {
            padding-right: 40px;
        }
        .form-group .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-light);
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            position: relative;
        }
        .btn:hover { background: var(--primary-dark); }
        .btn:disabled { background: #9ca3af; cursor: not-allowed; }
        .btn .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
        }
        .btn.loading .loader { display: block; }
        
        @keyframes spin {
            to { transform: translateY(-50%) rotate(360deg); }
        }
        
        .link {
            text-align: center;
            margin-top: 20px;
            color: var(--text-light);
        }
        .link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .alert-error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .alert-success { background: #ecfdf5; color: #059669; border: 1px solid #a7f3d0; }
        .hidden { display: none !important; }
        
        .otp-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 25px 0;
        }
        .otp-inputs input {
            width: 45px;
            height: 55px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            border: 2px solid var(--border);
            border-radius: 8px;
        }
        .otp-inputs input:focus {
            border-color: var(--primary);
            outline: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>🤝 NeuralCare</h1>
                <p>Mental Health Support</p>
            </div>
            <div class="body">
                <!-- Login Form -->
                <div id="loginForm">
                    <div id="loginAlert" class="alert hidden"></div>
                    
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="loginEmail" placeholder="you@example.com">
                    </div>
                    
                    <div class="form-group">
                        <label>Password</label>
                        <div class="show-password">
                            <input type="password" id="loginPassword" placeholder="Enter password">
                            <span class="toggle-password" onclick="togglePassword('loginPassword')">👁️</span>
                        </div>
                    </div>
                    
                    <button class="btn" onclick="doLogin()" id="loginBtn">
                        Login
                        <span class="loader"></span>
                    </button>
                    
                    <div class="link">
                        <a href="#" onclick="showForgotPassword()">Forgot Password?</a>
                    </div>
                    <div class="link">
                        New user? <a href="signup.html">Sign up</a>
                    </div>
                </div>

                <!-- Forgot Password Form -->
                <div id="forgotPasswordForm" class="hidden">
                    <div id="forgotAlert" class="alert hidden"></div>
                    <p style="text-align: center; color: var(--text-light); margin-bottom: 15px;">
                        Enter your email to reset password
                    </p>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="forgotEmail" placeholder="you@example.com">
                    </div>
                    <button class="btn" onclick="sendForgotPasswordOTP()" id="forgotBtn">
                        Send OTP
                        <span class="loader"></span>
                    </button>
                    <div class="link">
                        <a href="#" onclick="showLogin()">Back to Login</a>
                    </div>
                </div>

                <!-- Reset Password Form -->
                <div id="resetPasswordForm" class="hidden">
                    <div id="resetAlert" class="alert hidden"></div>
                    <p style="text-align: center; color: var(--text-light); margin-bottom: 15px;">
                        Enter OTP and new password<br><strong id="resetEmail"></strong>
                    </p>
                    <div class="otp-inputs">
                        <input type="text" maxlength="1" oninput="moveToNextReset(this, 0)" data-index="0">
                        <input type="text" maxlength="1" oninput="moveToNextReset(this, 1)" data-index="1">
                        <input type="text" maxlength="1" oninput="moveToNextReset(this, 2)" data-index="2">
                        <input type="text" maxlength="1" oninput="moveToNextReset(this, 3)" data-index="3">
                        <input type="text" maxlength="1" oninput="moveToNextReset(this, 4)" data-index="4">
                        <input type="text" maxlength="1" oninput="moveToNextReset(this, 5)" data-index="5">
                    </div>
                    <div class="form-group">
                        <label>New Password</label>
                        <div class="show-password">
                            <input type="password" id="newPassword" placeholder="New password">
                            <span class="toggle-password" onclick="togglePassword('newPassword')">👁️</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <div class="show-password">
                            <input type="password" id="confirmPassword" placeholder="Confirm password">
                            <span class="toggle-password" onclick="togglePassword('confirmPassword')">👁️</span>
                        </div>
                    </div>
                    <button class="btn" onclick="resetPassword()" id="resetBtn">
                        Reset Password
                        <span class="loader"></span>
                    </button>
                    <div id="resetTimer" style="text-align: center; margin-top: 10px; color: var(--text-light);"></div>
                    <div class="link">
                        <a href="#" onclick="showForgotPassword()">Change email</a> | 
                        <a href="#" id="resendResetBtn" onclick="sendForgotPasswordOTP()">Resend OTP</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const API = '';
        let loginEmail = '';
        let loginPassword = '';
        
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function moveToNext(input, index) {
            if (input.value && index < 5) {
                document.querySelectorAll('#otpLoginForm .otp-inputs input')[index + 1].focus();
            }
        }

        function moveToNextReset(input, index) {
            if (input.value && index < 5) {
                document.querySelectorAll('#resetPasswordForm .otp-inputs input')[index + 1].focus();
            }
        }

        function showLogin() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('otpLoginForm').classList.add('hidden');
            document.getElementById('forgotPasswordForm').classList.add('hidden');
            document.getElementById('resetPasswordForm').classList.add('hidden');
        }

        function showForgotPassword() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('otpLoginForm').classList.add('hidden');
            document.getElementById('forgotPasswordForm').classList.remove('hidden');
            document.getElementById('resetPasswordForm').classList.add('hidden');
        }

        function showResetForm(email) {
            loginEmail = email;
            document.getElementById('forgotPasswordForm').classList.add('hidden');
            document.getElementById('resetPasswordForm').classList.remove('hidden');
            document.getElementById('resetEmail').textContent = email;
            document.getElementById('resetPasswordForm').querySelectorAll('.otp-inputs input').forEach(i => i.value = '');
            document.querySelectorAll('#resetPasswordForm .otp-inputs input')[0].focus();
            startOTPTimer('resetTimer', 'resendResetBtn');
        }

        function startOTPTimer(timerId, btnId) {
            let countdown = 30;
            const btn = document.getElementById(btnId);
            if (btn) {
                btn.style.pointerEvents = 'none';
                btn.style.color = 'var(--text-light)';
            }
            
            const timerEl = document.getElementById(timerId);
            if (timerEl) timerEl.innerHTML = '<span style="color: var(--primary); font-size: 13px;">OTP valid for 30 minutes</span>';
            
            const interval = setInterval(() => {
                countdown--;
                if (timerEl && countdown > 0) {
                    timerEl.innerHTML = `<span style="color: var(--text-light); font-size: 13px;">Resend in ${countdown}s | OTP valid for 30 min</span>`;
                }
                if (countdown <= 0) {
                    clearInterval(interval);
                    if (btn) {
                        btn.style.pointerEvents = 'auto';
                        btn.style.color = 'var(--primary)';
                    }
                    if (timerEl) timerEl.innerHTML = '<span style="color: var(--secondary); font-size: 13px;">You can now resend OTP</span>';
                }
            }, 1000);
        }

        function showAlert(id, msg, type) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.className = `alert alert-${type}`;
        }

        function setLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            if (loading) {
                btn.classList.add('loading');
                btn.disabled = true;
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        async function doLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !email.includes('@')) {
                showAlert('loginAlert', 'Please enter a valid email', 'error');
                return;
            }
            if (!password) {
                showAlert('loginAlert', 'Please enter password', 'error');
                return;
            }
            
            setLoading('loginBtn', true);
            
            try {
                const res = await fetch(`${API}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('neuralcare_token', data.token);
                    window.location.href = 'dashboard.html';
                } else {
                    showAlert('loginAlert', data.message, 'error');
                }
            } catch(e) {
                showAlert('loginAlert', 'Error logging in', 'error');
            }
            setLoading('loginBtn', false);
        }

        async function verifyLoginOTP() {
            const otp = Array.from(document.querySelectorAll('#otpLoginForm .otp-inputs input')).map(i => i.value).join('');
            if (otp.length !== 6) {
                showAlert('otpLoginAlert', 'Please enter 6-digit OTP', 'error');
                return;
            }
            
            setLoading('verifyLoginBtn', true);
            
            try {
                const res = await fetch(`${API}/api/auth/verify-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: loginEmail, password: loginPassword, otp })
                });
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('neuralcare_token', data.token);
                    window.location.href = 'dashboard.html';
                } else {
                    showAlert('otpLoginAlert', data.message, 'error');
                }
            } catch(e) {
                showAlert('otpLoginAlert', 'Error verifying OTP', 'error');
            }
            setLoading('verifyLoginBtn', false);
        }

        async function resendLoginOTP() {
            await sendForgotPasswordOTP();
        }

        async function sendForgotPasswordOTP() {
            const email = document.getElementById('forgotEmail').value;
            
            if (!email || !email.includes('@')) {
                showAlert('forgotAlert', 'Please enter a valid email', 'error');
                return;
            }
            
            setLoading('forgotBtn', true);
            
            try {
                const res = await fetch(`${API}/api/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                
                if (data.success) {
                    let msg = 'OTP sent to your email!';
                    if (data.devOTP) {
                        msg = `OTP: ${data.devOTP} (Also check server console)`;
                    }
                    showAlert('forgotAlert', msg, 'success');
                    showResetForm(email);
                } else {
                    showAlert('forgotAlert', data.message, 'error');
                }
            } catch(e) {
                showAlert('forgotAlert', 'Error sending OTP', 'error');
            }
            setLoading('forgotBtn', false);
        }

        async function resetPassword() {
            const otp = Array.from(document.querySelectorAll('#resetPasswordForm .otp-inputs input')).map(i => i.value).join('');
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (otp.length !== 6) {
                showAlert('resetAlert', 'Please enter 6-digit OTP', 'error');
                return;
            }
            if (!newPassword || newPassword.length < 6) {
                showAlert('resetAlert', 'Password must be at least 6 characters', 'error');
                return;
            }
            if (newPassword !== confirmPassword) {
                showAlert('resetAlert', 'Passwords do not match', 'error');
                return;
            }
            
            setLoading('resetBtn', true);
            
            try {
                const res = await fetch(`${API}/api/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: loginEmail, otp, password: newPassword })
                });
                const data = await res.json();
                
                if (data.success) {
                    showAlert('resetAlert', 'Password reset successful!', 'success');
                    setTimeout(() => {
                        showLogin();
                        document.getElementById('loginEmail').value = loginEmail;
                    }, 1500);
                } else {
                    showAlert('resetAlert', data.message, 'error');
                }
            } catch(e) {
                showAlert('resetAlert', 'Error resetting password', 'error');
            }
            setLoading('resetBtn', false);
        }

        // Handle Enter key
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                if (!document.getElementById('loginForm').classList.contains('hidden')) {
                    doLogin();
                } else if (!document.getElementById('otpLoginForm').classList.contains('hidden')) {
                    verifyLoginOTP();
                } else if (!document.getElementById('forgotPasswordForm').classList.contains('hidden')) {
                    sendForgotPasswordOTP();
                } else if (!document.getElementById('resetPasswordForm').classList.contains('hidden')) {
                    resetPassword();
                }
            }
        });
    </script>
</body>
</html>
