<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralCare · Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(145deg, #0B1120 0%, #192132 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background elements */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 460px;
            position: relative;
            z-index: 10;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .brand p {
            color: #94a3b8;
            font-size: 0.95rem;
            font-weight: 400;
        }

        .card {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Role Selector */
        .role-selector {
            display: flex;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.03);
            padding: 0.5rem;
            border-radius: 16px;
            margin-bottom: 2rem;
        }

        .role-option {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0.75rem 0.5rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            border: 1px solid transparent;
        }

        .role-option:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .role-option.active {
            background: rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .role-option .icon {
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
        }

        .role-option .label {
            font-size: 0.8rem;
            font-weight: 500;
            color: #e2e8f0;
        }

        .role-option .badge {
            font-size: 0.7rem;
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            margin-top: 0.25rem;
            font-weight: 500;
        }

        .badge.patient {
            background: rgba(99, 102, 241, 0.2);
            color: #818cf8;
        }

        .badge.doctor {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        .badge.admin {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .form-section {
            transition: opacity 0.3s ease;
        }

        .form-section.hidden {
            display: none;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-label {
            display: block;
            margin-bottom: 0.5rem;
            color: #e2e8f0;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            color: #64748b;
            font-size: 1.1rem;
        }

        .input-field {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #f1f5f9;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: #6366f1;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .input-field::placeholder {
            color: #475569;
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }

        .password-toggle:hover {
            color: #818cf8;
        }

        .otp-container {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            margin: 1.5rem 0;
        }

        .otp-input {
            width: 3rem;
            height: 3.5rem;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #f1f5f9;
        }

        .otp-input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .action-button {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .action-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(99, 102, 241, 0.5);
        }

        .action-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .button-loader {
            display: none;
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
        }

        .action-button.loading .button-loader {
            display: block;
        }

        @keyframes spin {
            to { transform: translateY(-50%) rotate(360deg); }
        }

        .link-group {
            text-align: center;
            margin-top: 1.5rem;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .link-group a {
            color: #818cf8;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .link-group a:hover {
            color: #6366f1;
            text-decoration: underline;
        }

        .message-box {
            padding: 0.875rem 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: shake 0.3s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .message-box.error {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.2);
            color: #f87171;
        }

        .message-box.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .message-box.warning {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        .message-box.info {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            color: #818cf8;
        }

        .message-box.hidden {
            display: none;
        }

        .timer-text {
            text-align: center;
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 0.75rem;
        }

        .resend-link {
            color: #818cf8;
            cursor: pointer;
            transition: color 0.2s;
        }

        .resend-link.disabled {
            color: #475569;
            pointer-events: none;
            cursor: default;
        }

        .quick-test {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .quick-test-title {
            color: #94a3b8;
            font-size: 0.8rem;
            text-align: center;
            margin-bottom: 0.75rem;
        }

        .test-buttons {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
        }

        .test-btn {
            padding: 0.5rem 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: #e2e8f0;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .test-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .test-btn.patient:hover {
            border-color: #818cf8;
        }

        .test-btn.doctor:hover {
            border-color: #fbbf24;
        }

        .test-btn.admin:hover {
            border-color: #f87171;
        }

        @media (max-width: 480px) {
            .card {
                padding: 1.5rem;
            }

            .otp-container {
                gap: 0.5rem;
            }

            .otp-input {
                width: 2.5rem;
                height: 3rem;
                font-size: 1.25rem;
            }

            .brand h1 {
                font-size: 2rem;
            }

            .role-option .icon {
                font-size: 1.25rem;
            }

            .role-option .label {
                font-size: 0.7rem;
            }

            .test-buttons {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">
            <h1>NeuralCare</h1>
            <p>Your journey to mental wellness starts here</p>
        </div>

        <div class="card">
            <!-- Role Selector (Patient, Doctor, Admin) -->
            <div class="role-selector">
                <div class="role-option active" onclick="selectRole('patient')" id="rolePatient">
                    <span class="icon">👤</span>
                    <span class="label">Patient</span>
                    <span class="badge patient">Free</span>
                </div>
                <div class="role-option" onclick="selectRole('doctor')" id="roleDoctor">
                    <span class="icon">👨‍⚕️</span>
                    <span class="label">Doctor</span>
                    <span class="badge doctor">₹1999/yr</span>
                </div>
                <div class="role-option" onclick="selectRole('admin')" id="roleAdmin">
                    <span class="icon">👑</span>
                    <span class="label">Staff</span>
                    <span class="badge admin">Admin</span>
                </div>
            </div>

            <!-- Login Section -->
            <div id="loginSection" class="form-section">
                <div id="loginMessage" class="message-box hidden">
                    <span>🔔</span>
                    <span id="loginMessageText"></span>
                </div>

                <div class="input-group">
                    <label class="input-label">Email address</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email" id="loginEmail" class="input-field" placeholder="hello@example.com" value="admin@neuralcare.com">
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="loginPassword" class="input-field" placeholder="••••••••" value="Admin@123">
                        <button class="password-toggle" onclick="toggleFieldVisibility('loginPassword', this)">👁️</button>
                    </div>
                </div>

                <input type="hidden" id="loginRole" value="patient">

                <button class="action-button" onclick="processLogin()" id="loginButton">
                    <span>Sign in to account</span>
                    <span class="button-loader"></span>
                </button>

                <div class="link-group">
                    <a href="#" onclick="showRecoveryFlow()">Forgot your password?</a>
                    <span style="margin: 0 0.5rem; color: #334155;">·</span>
                    <a href="signup.html">Create account</a>
                </div>

                <!-- Quick Test Buttons (for development) -->
                <div class="quick-test">
                    <div class="quick-test-title">⚡ Quick Test Login</div>
                    <div class="test-buttons">
                        <button class="test-btn patient" onclick="quickLogin('patient')">
                            <span>👤</span> Patient
                        </button>
                        <button class="test-btn doctor" onclick="quickLogin('doctor')">
                            <span>👨‍⚕️</span> Doctor
                        </button>
                        <button class="test-btn admin" onclick="quickLogin('admin')">
                            <span>👑</span> Admin
                        </button>
                    </div>
                </div>
            </div>

            <!-- Password Recovery Section -->
            <div id="recoverySection" class="form-section hidden">
                <div id="recoveryMessage" class="message-box hidden">
                    <span>📧</span>
                    <span id="recoveryMessageText"></span>
                </div>

                <p style="color: #94a3b8; text-align: center; margin-bottom: 1.5rem; font-size: 0.95rem;">
                    We'll send a verification code to your email
                </p>

                <div class="input-group">
                    <label class="input-label">Email address</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email" id="recoveryEmail" class="input-field" placeholder="hello@example.com">
                    </div>
                </div>

                <button class="action-button" onclick="sendRecoveryCode()" id="recoveryButton">
                    <span>Send recovery code</span>
                    <span class="button-loader"></span>
                </button>

                <div class="link-group">
                    <a href="#" onclick="showLogin()">Back to sign in</a>
                </div>
            </div>

            <!-- Reset Password Section -->
            <div id="resetSection" class="form-section hidden">
                <div id="resetMessage" class="message-box hidden">
                    <span>🔐</span>
                    <span id="resetMessageText"></span>
                </div>

                <p style="color: #94a3b8; text-align: center; margin-bottom: 1rem;">
                    Enter code sent to <span id="resetEmailDisplay" style="color: #818cf8; font-weight: 500;"></span>
                </p>

                <div class="otp-container" id="otpContainer">
                    <input type="text" class="otp-input" maxlength="1" oninput="handleOTPInput(this, 0)" data-index="0">
                    <input type="text" class="otp-input" maxlength="1" oninput="handleOTPInput(this, 1)" data-index="1">
                    <input type="text" class="otp-input" maxlength="1" oninput="handleOTPInput(this, 2)" data-index="2">
                    <input type="text" class="otp-input" maxlength="1" oninput="handleOTPInput(this, 3)" data-index="3">
                    <input type="text" class="otp-input" maxlength="1" oninput="handleOTPInput(this, 4)" data-index="4">
                    <input type="text" class="otp-input" maxlength="1" oninput="handleOTPInput(this, 5)" data-index="5">
                </div>

                <div class="input-group">
                    <label class="input-label">New password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="newPasswordField" class="input-field" placeholder="Create new password">
                        <button class="password-toggle" onclick="toggleFieldVisibility('newPasswordField', this)">👁️</button>
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">Confirm password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="confirmPasswordField" class="input-field" placeholder="Confirm new password">
                        <button class="password-toggle" onclick="toggleFieldVisibility('confirmPasswordField', this)">👁️</button>
                    </div>
                </div>

                <button class="action-button" onclick="processPasswordReset()" id="resetButton">
                    <span>Update password</span>
                    <span class="button-loader"></span>
                </button>

                <div class="timer-text" id="resetTimer"></div>
                
                <div class="link-group">
                    <a href="#" onclick="showRecoveryFlow()">Use different email</a>
                    <span style="margin: 0 0.5rem; color: #334155;">·</span>
                    <a href="#" onclick="resendRecoveryCode()" id="resendResetLink">Resend code</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State management
        let currentUserEmail = '';
        let countdownInterval = null;
        let selectedRole = 'patient';
        const API_URL = ''; // Empty for relative URLs

        // ==================== UI FUNCTIONS ====================

        // Role selection
        function selectRole(role) {
            document.querySelectorAll('.role-option').forEach(el => {
                el.classList.remove('active');
            });
            document.getElementById('role' + role.charAt(0).toUpperCase() + role.slice(1)).classList.add('active');
            document.getElementById('loginRole').value = role;
            selectedRole = role;
            clearAllMessages();
        }

        // Show login section
        function showLogin() {
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('recoverySection').classList.add('hidden');
            document.getElementById('resetSection').classList.add('hidden');
            clearAllMessages();
        }

        // Show recovery flow
        function showRecoveryFlow() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('recoverySection').classList.remove('hidden');
            document.getElementById('resetSection').classList.add('hidden');
            clearAllMessages();
        }

        // Clear all message boxes
        function clearAllMessages() {
            ['loginMessage', 'recoveryMessage', 'resetMessage'].forEach(id => {
                const el = document.getElementById(id);
                el.classList.add('hidden');
            });
        }

        // Toggle password visibility
        function toggleFieldVisibility(fieldId, button) {
            const field = document.getElementById(fieldId);
            const type = field.getAttribute('type') === 'password' ? 'text' : 'password';
            field.setAttribute('type', type);
            button.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
        }

        // Handle OTP input
        function handleOTPInput(currentInput, index) {
            if (currentInput.value.length === 1) {
                const nextInput = document.querySelector(`.otp-input[data-index="${index + 1}"]`);
                if (nextInput) nextInput.focus();
            }

            // Handle backspace
            currentInput.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && !this.value) {
                    const prevInput = document.querySelector(`.otp-input[data-index="${index - 1}"]`);
                    if (prevInput) {
                        prevInput.focus();
                        prevInput.value = '';
                    }
                }
            }, { once: true });
        }

        // Show message
        function showMessage(containerId, textId, message, type) {
            const container = document.getElementById(containerId);
            const textElement = document.getElementById(textId);
            
            textElement.textContent = message;
            container.className = `message-box ${type}`;
            container.classList.remove('hidden');

            // Auto hide after 5 seconds for success messages
            if (type === 'success') {
                setTimeout(() => {
                    container.classList.add('hidden');
                }, 5000);
            }
        }

        // Set button loading state
        function setButtonLoading(buttonId, isLoading) {
            const button = document.getElementById(buttonId);
            if (isLoading) {
                button.classList.add('loading');
                button.disabled = true;
            } else {
                button.classList.remove('loading');
                button.disabled = false;
            }
        }

        // Quick login for testing
        function quickLogin(role) {
            const credentials = {
                patient: { email: 'patient@example.com', password: 'patient123' },
                doctor: { email: 'doctor@example.com', password: 'doctor123' },
                admin: { email: 'admin@neuralcare.com', password: 'Admin@123' }
            };
            
            if (credentials[role]) {
                document.getElementById('loginEmail').value = credentials[role].email;
                document.getElementById('loginPassword').value = credentials[role].password;
                selectRole(role);
                processLogin();
            }
        }

        // ==================== AUTH FUNCTIONS ====================

        // Process login
        async function processLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const role = selectedRole;

            if (!email || !email.includes('@')) {
                showMessage('loginMessage', 'loginMessageText', 'Please enter a valid email address', 'error');
                return;
            }

            if (!password) {
                showMessage('loginMessage', 'loginMessageText', 'Please enter your password', 'error');
                return;
            }

            setButtonLoading('loginButton', true);

            try {
                console.log(`Attempting login for ${role}: ${email}`);
                
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        email, 
                        password, 
                        role 
                    })
                });

                const data = await response.json();
                console.log('Login response:', data);

                if (data.success) {
                    localStorage.setItem('neuralcare_token', data.token);
                    localStorage.setItem('user_role', data.role);
                    localStorage.setItem('user_data', JSON.stringify(data.user));
                    
                    showMessage('loginMessage', 'loginMessageText', 'Login successful! Redirecting...', 'success');
                    
                    // Redirect based on role
                    setTimeout(() => {
                        if (data.role === 'doctor') {
                            window.location.href = 'doctor-dashboard.html';
                        } else if (data.role === 'admin') {
                            window.location.href = 'admin-dashboard.html';
                        } else {
                            window.location.href = 'dashboard.html';
                        }
                    }, 1000);
                    
                } else if (data.requiresPayment) {
                    showMessage('loginMessage', 'loginMessageText', `Payment required: ₹${data.fee}. Redirecting...`, 'warning');
                    setTimeout(() => {
                        window.location.href = `payment.html?type=doctor_subscription&fee=${data.fee}&email=${encodeURIComponent(email)}`;
                    }, 2000);
                    
                } else if (data.pendingVerification) {
                    showMessage('loginMessage', 'loginMessageText', 'Your account is pending verification by admin.', 'info');
                    
                } else {
                    showMessage('loginMessage', 'loginMessageText', data.message || 'Invalid email or password', 'error');
                }
                
            } catch (error) {
                console.error('Login error:', error);
                showMessage('loginMessage', 'loginMessageText', 'Network error. Please check your connection.', 'error');
            }

            setButtonLoading('loginButton', false);
        }

        // Send recovery code
        async function sendRecoveryCode() {
            const email = document.getElementById('recoveryEmail').value.trim();
            
            if (!email || !email.includes('@') || !email.includes('.')) {
                showMessage('recoveryMessage', 'recoveryMessageText', 'Please enter a valid email address', 'error');
                return;
            }

            setButtonLoading('recoveryButton', true);

            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    currentUserEmail = email;
                    showMessage('recoveryMessage', 'recoveryMessageText', data.devOTP ? `OTP: ${data.devOTP}` : 'Verification code sent to your email', 'success');
                    
                    setTimeout(() => {
                        showResetScreen(email);
                    }, 1000);
                } else {
                    showMessage('recoveryMessage', 'recoveryMessageText', data.message || 'Unable to send code', 'error');
                }
            } catch (error) {
                showMessage('recoveryMessage', 'recoveryMessageText', 'Network error. Please try again.', 'error');
            }

            setButtonLoading('recoveryButton', false);
        }

        // Show reset password screen
        function showResetScreen(email) {
            document.getElementById('recoverySection').classList.add('hidden');
            document.getElementById('resetSection').classList.remove('hidden');
            document.getElementById('resetEmailDisplay').textContent = email;
            
            // Clear OTP inputs
            document.querySelectorAll('.otp-input').forEach(input => input.value = '');
            
            // Start timer
            startResendTimer(300); // 5 minutes in seconds
        }

        // Start resend timer
        function startResendTimer(seconds) {
            const timerElement = document.getElementById('resetTimer');
            const resendLink = document.getElementById('resendResetLink');
            
            if (countdownInterval) clearInterval(countdownInterval);
            
            resendLink.classList.add('disabled');
            
            let timeLeft = seconds;
            countdownInterval = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    timerElement.innerHTML = '';
                    resendLink.classList.remove('disabled');
                } else {
                    const minutes = Math.floor(timeLeft / 60);
                    const secs = timeLeft % 60;
                    timerElement.innerHTML = `Code expires in <span style="color: #818cf8;">${minutes}:${secs.toString().padStart(2, '0')}</span>`;
                    timeLeft--;
                }
            }, 1000);
        }

        // Resend recovery code
        async function resendRecoveryCode() {
            if (document.getElementById('resendResetLink').classList.contains('disabled')) return;
            
            if (!currentUserEmail) {
                showRecoveryFlow();
                return;
            }

            setButtonLoading('resetButton', true);
            
            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentUserEmail })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage('resetMessage', 'resetMessageText', data.devOTP ? `New OTP: ${data.devOTP}` : 'New code sent successfully', 'success');
                    startResendTimer(300);
                } else {
                    showMessage('resetMessage', 'resetMessageText', data.message || 'Failed to resend code', 'error');
                }
            } catch (error) {
                showMessage('resetMessage', 'resetMessageText', 'Failed to resend code', 'error');
            }

            setButtonLoading('resetButton', false);
        }

        // Process password reset
        async function processPasswordReset() {
            const otpInputs = document.querySelectorAll('.otp-input');
            const otp = Array.from(otpInputs).map(input => input.value).join('');
            const newPassword = document.getElementById('newPasswordField').value;
            const confirmPassword = document.getElementById('confirmPasswordField').value;

            // Validate inputs
            if (otp.length !== 6) {
                showMessage('resetMessage', 'resetMessageText', 'Please enter the complete 6-digit code', 'error');
                return;
            }

            if (newPassword.length < 6) {
                showMessage('resetMessage', 'resetMessageText', 'Password must be at least 6 characters', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showMessage('resetMessage', 'resetMessageText', 'Passwords do not match', 'error');
                return;
            }

            setButtonLoading('resetButton', true);

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: currentUserEmail,
                        password: newPassword
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('resetMessage', 'resetMessageText', 'Password updated successfully!', 'success');
                    
                    setTimeout(() => {
                        showLogin();
                        document.getElementById('loginEmail').value = currentUserEmail;
                        document.getElementById('loginPassword').value = '';
                    }, 2000);
                } else {
                    showMessage('resetMessage', 'resetMessageText', data.message || 'Unable to reset password', 'error');
                }
            } catch (error) {
                showMessage('resetMessage', 'resetMessageText', 'Unable to reset password', 'error');
            }

            setButtonLoading('resetButton', false);
        }

        // ==================== UTILITY FUNCTIONS ====================

        // Check if already logged in
        function checkAuth() {
            const token = localStorage.getItem('neuralcare_token');
            const role = localStorage.getItem('user_role');
            
            if (token && role) {
                if (role === 'doctor') {
                    window.location.href = 'doctor-dashboard.html';
                } else if (role === 'admin') {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            }
        }

        // Enter key handler
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (!document.getElementById('loginSection').classList.contains('hidden')) {
                    processLogin();
                } else if (!document.getElementById('recoverySection').classList.contains('hidden')) {
                    sendRecoveryCode();
                } else if (!document.getElementById('resetSection').classList.contains('hidden')) {
                    processPasswordReset();
                }
            }
        });

        // Clean up interval on page unload
        window.addEventListener('beforeunload', () => {
            if (countdownInterval) clearInterval(countdownInterval);
        });

        // Initialize
        window.addEventListener('load', () => {
            checkAuth();
            
            // Set default role to patient (but admin is pre-filled for demo)
            selectRole('patient');
            
            // Pre-fill admin credentials for demo
            document.getElementById('loginEmail').value = 'admin@neuralcare.com';
            document.getElementById('loginPassword').value = 'Admin@123';
        });
    </script>
</body>
</html>
