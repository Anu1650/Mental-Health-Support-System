<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralCare - Journal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #10b981; --danger: #ef4444; --surface: #ffffff; --text: #1f2937; --text-light: #6b7280; --border: #e5e7eb; --shadow: 0 10px 25px rgba(0,0,0,0.1); --radius: 12px; }
        body { font-family: 'Inter', sans-serif; background: #f9fafb; }
        .app-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 220px; background: var(--surface); padding: 20px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; background: var(--primary); color: white; border-radius: var(--radius); margin-bottom: 20px; }
        .sidebar-user { display: flex; align-items: center; gap: 10px; }
        .sidebar-user .avatar { width: 40px; height: 40px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 18px; }
        .nav-item { padding: 12px 15px; border-radius: 8px; cursor: pointer; color: var(--text-light); display: flex; align-items: center; gap: 10px; margin-bottom: 5px; transition: all 0.2s; font-size: 14px; }
        .nav-item:hover, .nav-item.active { background: #f3f4f6; color: var(--primary); }
        .btn-logout { width: 100%; padding: 10px; background: transparent; color: var(--danger); border: 1px solid var(--danger); border-radius: 8px; cursor: pointer; margin-top: auto; }
        .main-content { flex: 1; padding: 25px; overflow-y: auto; }
        h2 { margin-bottom: 8px; color: var(--text); }
        p { color: var(--text-light); margin-bottom: 20px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text); }
        .form-group input, .form-group textarea { width: 100%; padding: 12px 15px; border: 2px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
        .btn { padding: 12px 24px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn:hover { background: var(--primary-dark); }
        .entry-card { padding: 15px; background: #f3f4f6; border-radius: 8px; margin-bottom: 10px; }
        .entry-card strong { display: block; margin-bottom: 5px; }
        .entry-card p { margin: 5px 0; color: #666; font-size: 14px; }
        .entry-card small { color: #999; }
        .quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .quick-btn { padding: 8px; background: #f3f4f6; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-user">
                    <div class="avatar" id="userAvatar">U</div>
                    <div><div id="userName" style="font-weight: 600;">User</div><small id="userEmail" style="opacity: 0.8;">user@email</small></div>
                </div>
            </div>
            <nav>
                <div class="nav-item" data-page="chat.html"><span>💬</span> Chat</div>
                <div class="nav-item" data-page="mood.html"><span>😊</span> Mood Tracker</div>
                <div class="nav-item active" data-page="journal.html"><span>📝</span> Journal</div>
                <div class="nav-item" data-page="progress.html"><span>📊</span> My Progress</div>
                <div class="nav-item" data-page="clinic.html"><span>🏥</span> Clinic Reports</div>
                <div class="nav-item" data-page="patient.html"><span>👤</span> Patient Details</div>
                <div class="nav-item" data-page="medication.html"><span>💊</span> Medications</div>
                <div class="nav-item" data-page="routine.html"><span>⏰</span> Daily Routine</div>
            </nav>
            <div class="quick-actions">
                <button class="quick-btn" onclick="navigate('chat.html')">💬 Chat</button>
                <button class="quick-btn" onclick="navigate('mood.html')">😊 Mood</button>
            </div>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </aside>
        <main class="main-content">
            <h2>📝 Journal</h2>
            <p>Write your thoughts and feelings</p>
            <div class="form-group" style="margin-top: 20px;">
                <label>Title</label>
                <input type="text" id="journalTitle" placeholder="What's on your mind?">
            </div>
            <div class="form-group">
                <label>Write your thoughts</label>
                <textarea id="journalContent" rows="5" placeholder="Write freely..."></textarea>
            </div>
            <button class="btn" onclick="saveJournal()">Save Entry</button>
            <h3 style="margin-top: 30px;">Recent Entries</h3>
            <div id="journalEntries" style="margin-top: 15px;"></div>
        </main>
    </div>
    <script>
        const API = ''; let token = localStorage.getItem('neuralcare_token');
        if (!token) window.location.href = 'index.html';
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                localStorage.setItem('current_page', this.getAttribute('data-page'));
                window.location.href = this.getAttribute('data-page');
            });
        });

        async function checkAuth() {
            const res = await fetch(`${API}/api/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            if (data.success) {
                document.getElementById('userName').textContent = data.user.name || 'User';
                document.getElementById('userEmail').textContent = data.user.email;
                document.getElementById('userAvatar').textContent = (data.user.name || 'U')[0].toUpperCase();
                loadJournal();
            } else logout();
        }
        checkAuth();

        async function saveJournal() {
            const title = document.getElementById('journalTitle').value;
            const content = document.getElementById('journalContent').value;
            if (!content) return alert('Please write something');
            await fetch(`${API}/api/journal`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ title, content }) });
            document.getElementById('journalTitle').value = ''; document.getElementById('journalContent').value = ''; alert('Saved!'); loadJournal();
        }

        async function loadJournal() {
            const res = await fetch(`${API}/api/journal`, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            document.getElementById('journalEntries').innerHTML = data.entries?.map(e => `<div class="entry-card"><strong>${e.title || 'Entry'}</strong><p>${e.content.substring(0, 150)}...</p><small>${new Date(e.createdAt).toLocaleDateString()}</small></div>`).join('') || '<p>No entries yet</p>';
        }

        function navigate(p) { localStorage.setItem('current_page', p); window.location.href = p; }
        function logout() { localStorage.removeItem('neuralcare_token'); window.location.href = 'index.html'; }
    </script>
</body>
</html>
